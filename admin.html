<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Love Gallery Admin</title>
  <style>
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#111;color:#fff;max-width:900px;margin:0 auto;padding:24px}
    .card{background:#1b1b1b;border:1px solid #333;border-radius:16px;padding:18px;margin:16px 0}
    input,textarea,button{width:100%;padding:12px;border-radius:12px;border:1px solid #444;background:#222;color:#fff;margin-top:10px;box-sizing:border-box;font-size:14px}
    button{background:#ff5f95;border:none;font-weight:700;cursor:pointer;transition:0.2s}
    button:hover{background:#e0507f}
    button:disabled{background:#555;cursor:not-allowed}
    .item{display:grid;grid-template-columns:90px 1fr auto;gap:12px;align-items:center;padding:12px 0;border-top:1px solid #2e2e2e}
    .item img{width:90px;height:90px;object-fit:cover;border-radius:12px}
    .muted{color:#aaa;font-size:14px}
    a{color:#ff9fc0}
    .del-btn{width:auto;padding:8px 16px;background:#c44;font-size:12px}
    .del-btn:hover{background:#a33}
    .token-box{display:flex;gap:10px;align-items:center}
    .token-box input{flex:1}
    .token-box button{width:auto;padding:12px 20px}
    .lock-icon{font-size:2rem;text-align:center;margin:1rem 0}
  </style>
</head>
<body>
  <h1>💕 相册后台</h1>
  <div class="muted">上传后，前台首页会自动读取最新图片。数据存储在 GitHub，永远不会被暂停。</div>

  <!-- 简单密码入口 -->
  <div class="card" id="password-card">
    <div class="lock-icon">🔐</div>
    <h3>输入后台密码</h3>
    <div class="muted" style="margin-top:8px">请输入管理员密码</div>
    <div class="token-box">
      <input id="passwordInput" type="password" placeholder="输入后台密码" />
      <button id="passwordBtn">进入</button>
    </div>
    <div id="password-status" class="muted" style="margin-top:8px"></div>
  </div>

  <!-- GitHub Token 连接区：只在第一次配置或 Token 失效时出现 -->
  <div class="card" id="auth-card" style="display:none">
    <h3>连接 GitHub 相册仓库</h3>
    <div class="muted" style="margin-top:8px">第一次使用需要填 GitHub Personal Access Token（需要 repo 权限）。填过后会保存在当前浏览器，下次只输后台密码即可。</div>
    <div class="token-box">
      <input id="tokenInput" type="password" placeholder="ghp_xxxxxxxxxxxx" />
      <button id="loginBtn">保存</button>
    </div>
    <div id="auth-status" class="muted" style="margin-top:8px"></div>
    <div class="muted" style="margin-top:12px;font-size:12px">
      Token 只保存在你的浏览器本地，不会上传到其他服务器。<br>
      <a href="https://github.com/settings/tokens?type=beta" target="_blank">点击这里创建 Token →</a>
    </div>
  </div>

  <!-- 管理面板（登录后显示） -->
  <div id="admin-panel" style="display:none">
    <div class="card">
      <h3>上传照片</h3>
      <input id="photo" type="file" accept="image/*" />
      <textarea id="caption" placeholder="写一句文案，比如：今天也好喜欢你 💕"></textarea>
      <input id="sortOrder" type="number" placeholder="排序数字，越小越靠前" value="0" />
      <button id="uploadBtn">上传并加入相册</button>
      <div id="status" class="muted"></div>
    </div>

    <div class="card">
      <h3>当前照片</h3>
      <div id="list"><div class="muted">加载中...</div></div>
    </div>

    <div class="muted" style="margin-top:12px">
      <a href="./" target="_blank">打开前台首页</a> · 
      <span style="cursor:pointer;color:#ff9fc0" onclick="logout()">退出登录</span>
    </div>
  </div>

  <script>
    const OWNER = '3269915979jp-hash';
    const REPO = 'love-gallery';
    const BRANCH = 'main';
    const META_PATH = 'photos.json';
    const PHOTO_DIR = 'photos/';

    const ADMIN_PASSWORDS = ['2005109', '20051009'];
    let TOKEN = localStorage.getItem('lg_token') || '';
    let metaSha = ''; // photos.json 的 SHA（更新时需要）

    // === Auth ===
    const passwordCard = document.getElementById('password-card');
    const passwordInput = document.getElementById('passwordInput');
    const passwordBtn = document.getElementById('passwordBtn');
    const passwordStatus = document.getElementById('password-status');
    const authCard = document.getElementById('auth-card');
    const adminPanel = document.getElementById('admin-panel');
    const loginBtn = document.getElementById('loginBtn');
    const tokenInput = document.getElementById('tokenInput');
    const authStatus = document.getElementById('auth-status');

    function esc(s) {
      return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    async function ghFetch(path, opts = {}) {
      const url = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${path}`;
      const headers = { 'Authorization': `token ${TOKEN}`, 'Accept': 'application/vnd.github.v3+json', ...opts.headers };
      return fetch(url, { ...opts, headers });
    }

    async function checkToken(token) {
      const resp = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}`, {
        headers: { 'Authorization': `token ${token}` }
      });
      return resp.ok;
    }

    function showTokenCard(message = '') {
      passwordCard.style.display = 'none';
      authCard.style.display = 'block';
      adminPanel.style.display = 'none';
      authStatus.textContent = message;
    }

    async function enterAfterPassword() {
      if (TOKEN) {
        passwordStatus.textContent = '验证连接中...';
        try {
          if (await checkToken(TOKEN)) {
            showAdmin();
          } else {
            TOKEN = '';
            localStorage.removeItem('lg_token');
            showTokenCard('GitHub Token 已失效，请重新填写');
          }
        } catch(e) {
          passwordStatus.textContent = '网络错误: ' + e.message;
        }
      } else {
        showTokenCard('请先填写一次 GitHub Token，之后只需要输入后台密码');
      }
    }

    passwordBtn.onclick = () => {
      const password = passwordInput.value.trim();
      if (!ADMIN_PASSWORDS.includes(password)) {
        passwordStatus.textContent = '密码不对';
        return;
      }
      passwordStatus.textContent = '密码正确，正在进入...';
      sessionStorage.setItem('lg_admin_unlocked', '1');
      enterAfterPassword();
    };

    passwordInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') passwordBtn.click();
    });

    loginBtn.onclick = async () => {
      const t = tokenInput.value.trim();
      if (!t) { authStatus.textContent = '请输入 Token'; return; }
      authStatus.textContent = '验证中...';
      try {
        if (await checkToken(t)) {
          TOKEN = t;
          localStorage.setItem('lg_token', t);
          showAdmin();
        } else {
          authStatus.textContent = 'Token 无效或没有 repo 权限';
        }
      } catch(e) {
        authStatus.textContent = '网络错误: ' + e.message;
      }
    };

    function logout() {
      sessionStorage.removeItem('lg_admin_unlocked');
      adminPanel.style.display = 'none';
      authCard.style.display = 'none';
      passwordCard.style.display = 'block';
      passwordInput.value = '';
      passwordStatus.textContent = '已退出';
    }

    function showAdmin() {
      passwordCard.style.display = 'none';
      authCard.style.display = 'none';
      adminPanel.style.display = 'block';
      loadList();
    }

    // === Photo Management ===
    const statusEl = document.getElementById('status');
    const listEl = document.getElementById('list');
    const uploadBtn = document.getElementById('uploadBtn');

    function setStatus(text) { statusEl.textContent = text; }

    async function getMeta() {
      const resp = await ghFetch(META_PATH);
      if (!resp.ok) return [];
      const data = await resp.json();
      metaSha = data.sha;
      return JSON.parse(atob(data.content));
    }

    async function saveMeta(photos) {
      const body = {
        message: 'Update photos.json',
        content: btoa(unescape(encodeURIComponent(JSON.stringify(photos, null, 2)))),
        branch: BRANCH
      };
      if (metaSha) body.sha = metaSha;
      const resp = await ghFetch(META_PATH, { method: 'PUT', body: JSON.stringify(body) });
      const result = await resp.json();
      if (resp.ok) metaSha = result.content.sha;
      return resp.ok;
    }

    async function uploadFile(path, file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = async () => {
          const base64 = reader.result.split(',')[1];
          const body = {
            message: 'Add photo: ' + path,
            content: base64,
            branch: BRANCH
          };
          try {
            const resp = await ghFetch(path, { method: 'PUT', body: JSON.stringify(body) });
            resolve(resp.ok);
          } catch(e) { reject(e); }
        };
        reader.readAsDataURL(file);
      });
    }

    async function deleteFile(path) {
      // 先获取文件 SHA
      const resp = await ghFetch(path);
      if (!resp.ok) return false;
      const data = await resp.json();
      const body = { message: 'Delete: ' + path, sha: data.sha, branch: BRANCH };
      const delResp = await ghFetch(path, { method: 'DELETE', body: JSON.stringify(body) });
      return delResp.ok;
    }

    async function loadList() {
      setStatus('读取照片列表...');
      try {
        const photos = await getMeta();
        if (!photos.length) {
          listEl.innerHTML = '<div class="muted">还没有照片，试试上传一张？</div>';
          setStatus('暂无照片');
          return;
        }
        let html = '';
        photos.forEach((item, idx) => {
          const imgUrl = `https://raw.githubusercontent.com/${OWNER}/${REPO}/${BRANCH}/${item.path}`;
          html += `<div class="item">
            <img src="${esc(imgUrl)}" alt="photo" loading="lazy">
            <div>
              <div>${esc(item.caption || '（无文案）')}</div>
              <div class="muted">${esc(item.path)} · sort=${item.sort}</div>
            </div>
            <button class="del-btn" onclick="removeItem(${idx})">删除</button>
          </div>`;
        });
        listEl.innerHTML = html;
        setStatus('共 ' + photos.length + ' 张照片');
      } catch(e) {
        listEl.innerHTML = '<div class="muted">读取失败: ' + esc(e.message) + '</div>';
        setStatus('读取失败');
      }
    }

    window.removeItem = async function(idx) {
      if (!confirm('确定删除这张照片？')) return;
      setStatus('删除中...');
      try {
        const photos = await getMeta();
        const item = photos[idx];
        if (!item) { setStatus('照片不存在'); return; }
        // 删除 GitHub 上的图片文件
        await deleteFile(item.path);
        // 更新 photos.json
        photos.splice(idx, 1);
        await saveMeta(photos);
        setStatus('已删除');
        loadList();
      } catch(e) { setStatus('删除失败: ' + e.message); }
    };

    uploadBtn.onclick = async function() {
      const file = document.getElementById('photo').files[0];
      if (!file) { setStatus('请先选择一张图片'); return; }
      const caption = document.getElementById('caption').value.trim();
      const sort = parseInt(document.getElementById('sortOrder').value, 10) || 0;

      const ext = (file.name.split('.').pop() || 'jpg').toLowerCase();
      const fileName = Date.now() + '-' + Math.random().toString(36).slice(2,8) + '.' + ext;
      const filePath = PHOTO_DIR + fileName;

      setStatus('上传中: ' + file.name + ' ...');
      uploadBtn.disabled = true;

      try {
        const ok = await uploadFile(filePath, file);
        if (!ok) { setStatus('图片上传失败'); uploadBtn.disabled = false; return; }

        // 更新 photos.json
        const photos = await getMeta();
        photos.push({ path: filePath, caption, sort, date: new Date().toISOString() });
        photos.sort((a, b) => a.sort - b.sort);
        const saved = await saveMeta(photos);
        if (!saved) { setStatus('元数据保存失败'); uploadBtn.disabled = false; return; }

        setStatus('上传成功！✅');
        document.getElementById('photo').value = '';
        document.getElementById('caption').value = '';
        uploadBtn.disabled = false;
        loadList();
      } catch(e) {
        setStatus('上传异常: ' + e.message);
        uploadBtn.disabled = false;
      }
    };

    // === Init ===
    if (sessionStorage.getItem('lg_admin_unlocked') === '1') {
      enterAfterPassword();
    }
  </script>
</body>
</html>
